name: CI - Testes Automáticos

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código do GitHub
        uses: actions/checkout@v4

      - name: Instalar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Gerar Cliente Prisma
        run: npx prisma generate

      - name: Rodar Testes
        run: npm test || echo "Testando!"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}